# クラスター定義 — 一覧ページ・内部リンク・パンくずの生成元。
# 施策意図(archaive_article_plan.html): 中心(pillar)に用語(spoke)を内部リンクで束ね、
# ドメインの専門性評価を底上げする。spoke は基礎/コア機能/現場概念/課題文脈でグループ化。
# duplicates: 他クラスター(次のPLM/BOM)と定義が重なる spoke。定義文を複製しない運用(6.4)。
#
# spokes はグループ(spokeGroups)から自動で平坦化される（lib/guide.ts）。重複定義を避けるため
# フラットな spokes はここに書かない。
clusters:
  drawing-management:
    name: 図面管理ガイド
    pillars:
      - drawing-management-howto
      - why-not-adopted
    spokeGroups:
      - label: 基本を知る
        slugs:
          - drawing-management
          - drawing-management-system
          - ai-drawing-management
          - drawing-search
          - cloud-drawing-management
      - label: 主な機能
        slugs:
          - similar-search
          - ai-ocr
          - diff-detection
          - voucher-generation
          - revision-management
      - label: 現場でよく使う用語
        slugs:
          - drawing-number
          - block-count
          - bom
          - project-management
          - cad-data-management
          - drawing-numbering-rule
      - label: 課題から探す
        slugs:
          - drawing-attribution
          - file-server-limit
          - excel-drawing-limit
          - paper-drawing-digitization
          - design-reuse
          - tech-succession-2025
          - plm-pdm-difference
    # 着手順（最初に書く5本）
    startOrder:
      - drawing-management
      - drawing-management-system
      - drawing-management-howto
      - similar-search
      - ai-ocr
    # 重複注意（次のPLM/BOMクラスターと内容が重なる。定義文を複製しない）
    duplicates:
      - bom
      - plm-pdm-difference

  # クラスター② PLM・BOM。ピラー=中小製造業のPLM代替（診断ツール付き）。
  # bom は図面管理クラスター既出。ここでは内部リンクで受け、定義を二重化しない(6.4)。
  plm:
    name: PLM・BOM
    pillars:
      - plm-alternative-sme
    spokeGroups:
      - label: PLM・PDM・基幹システム
        slugs:
          - plm
          - pdm
          - erp
          - production-management-system
          - product-lifecycle-management
      - label: BOM・変更・構成
        slugs:
          - bom
          - ebom-mbom
          - design-change-management
          - configuration-management
          - traceability
    duplicates:
      - bom
      - plm-pdm-difference

  # クラスター③ 類似検索・AI。ピラー=暗黙知を形式知化するAI。
  # similar-search は図面管理クラスター既出。内部リンクで受ける。
  ai-search:
    name: 類似検索・AI
    pillars:
      - tacit-knowledge-ai
    spokeGroups:
      - label: 似た図面を探す
        slugs:
          - shape-search
          - vector-search
          - semantic-search
          - nl-search
          - similar-search
      - label: 生成AI・エージェント
        slugs:
          - rag
          - generative-ai-manufacturing
          - ai-agent
          - ai-estimation
          - knowledge-management

  # クラスター⑥ 建設業（新規）。新LP「建設業の方へ」由来。用語集(製造業オンリー)の最大の空白を埋める。
  # 製造業クラスターの核ナラ(図面起点・属人化解消)を建設の「物件起点」に翻訳。参照は内部完結。
  construction:
    name: 建設業
    pillars:
      - construction-drawing-management
    spokeGroups:
      - label: 建物と図面の基本
        slugs:
          - architectural-structural-mep-drawings
          - property-management
          - construction-zone
      - label: 現場の書類・管理
        slugs:
          - construction-plan
          - subcontractor-management
          - drawing-revision-management
      - label: 過去を活かす
        slugs:
          - similar-construction-search
      - label: 建設DX
        slugs:
          - bim
          - cim
          - i-construction
          - construction-management
          - estimation

  # クラスター⑦ セキュリティ規格（新規）。新LP「SECURITY」由来。一般論(SSL/TLS等)を具体規格に置換。
  # ピラー=情報漏洩対策（多層防御のハブ）。参照は内部＋既出語で完結。
  security:
    name: セキュリティ
    pillars:
      - information-leak-prevention
    spokeGroups:
      - label: 認証・暗号化
        slugs:
          - iso27001-isms
          - aes-256
          - tls-13
          - rbac
      - label: 可用性・データ保護
        slugs:
          - redundancy-high-availability
          - backup-data-protection
          - secure-cloud-aws

  # クラスター⑧ 連携・データ基盤（新規）。新LP「既存システムとつなぐ」由来。引っ越しでなく"つなぐ"。
  # ピラー=API連携（連携のハブ）。BOM/AI-OCR/ファイルサーバー等は既出を内部リンクで受ける。
  integration:
    name: 連携・データ基盤
    pillars:
      - api-integration
    spokeGroups:
      - label: システム連携
        slugs:
          - cad-integration
          - erp-integration
          - data-migration
      - label: データ化・形式
        slugs:
          - ai-ocr-datafication
          - supported-file-formats

  # クラスター⑨ ARCHAIVE機能（用語定義）。4モジュール(Core/Option/Data Pipeline/Customize)由来。
  features:
    name: ARCHAIVE機能
    pillars: []
    spokeGroups:
      - label: Core（基盤）
        slugs:
          - spec-management
          - parts-information-management
          - enterprise-search
          - manufacturing-project-management
      - label: Option（拡張）
        slugs:
          - 3d-cad
          - document-generation-ai
      - label: Data Pipeline（連携基盤）
        slugs:
          - sales-management-system
          - crm
          - rpa
          - etl
      - label: Customize（個別対応）
        slugs:
          - production-scheduler
          - modular-system
          - custom-app-development

  # DX・AI・データ基盤の土台用語（A〜C）。指名前の広い接点となる上位概念。
  dx-ai-data:
    name: DX・AI・データ基盤
    pillars: []
    spokeGroups:
      - label: DX・経営の上位概念
        slugs:
          - dx
          - manufacturing-dx
          - smart-factory
          - industry-4-0
          - paperless
      - label: AIの土台語
        slugs:
          - machine-learning
          - deep-learning
          - llm
          - hallucination
          - computer-vision
          - multimodal-ai
      - label: データ・情報基盤
        slugs:
          - unstructured-data
          - data-silo
          - metadata
          - mdm
          - saas

  # 製造・生産システムと現場概念（D〜E）。
  manufacturing-systems:
    name: 製造・生産システム
    pillars: []
    spokeGroups:
      - label: 製造・生産システム
        slugs:
          - scm
          - workflow
          - cae
          - cam
      - label: 製造・設計の現場概念
        slugs:
          - iot
          - digital-twin
          - predictive-maintenance
          - quality-control
          - front-loading
