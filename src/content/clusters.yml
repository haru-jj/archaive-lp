# クラスター定義 — 一覧ページ・内部リンク・パンくずの生成元。
# 施策意図(archaive_article_plan.html): 中心(pillar)に用語(spoke)を内部リンクで束ね、
# ドメインの専門性評価を底上げする。spoke は基礎/コア機能/現場概念/課題文脈でグループ化。
# duplicates: 他クラスター(次のPLM/BOM)と定義が重なる spoke。定義文を複製しない運用(6.4)。
#
# spokes はグループ(spokeGroups)から自動で平坦化される（lib/guide.ts）。重複定義を避けるため
# フラットな spokes はここに書かない。
clusters:
  drawing-management:
    name: 図面管理ガイド
    pillars:
      - drawing-management-howto
      - why-not-adopted
    spokeGroups:
      - label: 基本を知る
        slugs:
          - drawing-management
          - drawing-management-system
          - ai-drawing-management
          - drawing-search
          - cloud-drawing-management
      - label: 主な機能
        slugs:
          - similar-search
          - ai-ocr
          - diff-detection
          - voucher-generation
          - revision-management
      - label: 現場でよく使う用語
        slugs:
          - drawing-number
          - block-count
          - bom
          - project-management
          - cad-data-management
          - drawing-numbering-rule
      - label: 課題から探す
        slugs:
          - drawing-attribution
          - file-server-limit
          - excel-drawing-limit
          - paper-drawing-digitization
          - design-reuse
          - tech-succession-2025
          - plm-pdm-difference
    # 着手順（最初に書く5本）
    startOrder:
      - drawing-management
      - drawing-management-system
      - drawing-management-howto
      - similar-search
      - ai-ocr
    # 重複注意（次のPLM/BOMクラスターと内容が重なる。定義文を複製しない）
    duplicates:
      - bom
      - plm-pdm-difference

  # クラスター② PLM・BOM。ピラー=中小製造業のPLM代替（診断ツール付き）。
  # bom は図面管理クラスター既出。ここでは内部リンクで受け、定義を二重化しない(6.4)。
  plm:
    name: PLM・BOM
    pillars:
      - plm-alternative-sme
    spokeGroups:
      - label: PLM・PDM・基幹システム
        slugs:
          - plm
          - pdm
          - erp
          - production-management-system
          - product-lifecycle-management
      - label: BOM・変更・構成
        slugs:
          - bom
          - ebom-mbom
          - design-change-management
          - configuration-management
          - traceability
    duplicates:
      - bom
      - plm-pdm-difference

  # クラスター③ 類似検索・AI。ピラー=暗黙知を形式知化するAI。
  # similar-search は図面管理クラスター既出。内部リンクで受ける。
  ai-search:
    name: 類似検索・AI
    pillars:
      - tacit-knowledge-ai
    spokeGroups:
      - label: 似た図面を探す
        slugs:
          - shape-search
          - vector-search
          - semantic-search
          - nl-search
          - similar-search
      - label: 生成AI・エージェント
        slugs:
          - rag
          - generative-ai-manufacturing
          - ai-agent
          - ai-estimation
          - knowledge-management
